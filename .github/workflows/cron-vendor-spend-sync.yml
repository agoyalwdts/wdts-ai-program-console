# Cursor + OpenAI + Codex Enterprise Analytics + Workspace Analytics → VendorDailySpend / snapshots (HMAC cron).
# Cursor and Codex run hourly; OpenAI org costs stay twice daily (lighter rate-limit risk).
#
# Prerequisites:
#   - Repository secret CRON_SHARED_SECRET matches App Service CRON_SHARED_SECRET.
#   - App Service has Cursor / OpenAI credentials when those integrations are real.
#
# Hourly legs use a short lookback (incremental refresh). For history backfill,
# workflow_dispatch with cursor_backfill_days or openai_backfill_days (max 120) runs chunked windows.

name: Cron — vendor spend sync

on:
  schedule:
    - cron: "5 * * * *"
    - cron: "25 * * * *"
    - cron: "35 * * * *"
    - cron: "41 4 * * *"
    - cron: "41 16 * * *"
  workflow_dispatch:
    inputs:
      cursor_backfill_days:
        description: "Cursor backfill depth (0 = skip; max 120). Runs 7-day chunks via cron API."
        required: false
        default: "0"
        type: string
      openai_backfill_days:
        description: "OpenAI org costs backfill depth (0 = skip; max 120). Runs 31-day chunks via cron API."
        required: false
        default: "0"
        type: string

permissions:
  contents: read

env:
  DASHBOARD_BASE_URL: https://wdts-ai-program-console.azurewebsites.net

jobs:
  sync-cursor:
    name: cursor (hourly)
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '5 * * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: cron-vendor-spend-cursor
      cancel-in-progress: false
    steps:
      - name: Verify secret
        env:
          CRON_SHARED_SECRET: ${{ secrets.CRON_SHARED_SECRET }}
        run: |
          if [ -z "$CRON_SHARED_SECRET" ]; then
            echo "::error::CRON_SHARED_SECRET is not set."
            exit 1
          fi
      - name: POST sync-cursor-spend (incremental)
        if: github.event_name != 'workflow_dispatch' || inputs.cursor_backfill_days == '0' || inputs.cursor_backfill_days == ''
        env:
          CRON_SHARED_SECRET: ${{ secrets.CRON_SHARED_SECRET }}
        run: |
          BODY='{"lookbackDays":31}'
          SIG=$(printf '%s' "$BODY" | openssl dgst -sha256 -hmac "$CRON_SHARED_SECRET" | awk '{print $2}')
          URL="${DASHBOARD_BASE_URL}/api/cron/sync-cursor-spend"
          echo "## cursor incremental — $URL" >> "$GITHUB_STEP_SUMMARY"
          HTTP=$(curl -sS -o /tmp/out.json -w "%{http_code}" -X POST \
            -H "x-cron-signature: sha256=${SIG}" -H "content-type: application/json" \
            --data "$BODY" "$URL")
          cat /tmp/out.json >> "$GITHUB_STEP_SUMMARY"
          [ "$HTTP" = "200" ] || (echo "::error::HTTP $HTTP" && exit 1)
      - name: POST sync-cursor-spend (chunked backfill)
        if: github.event_name == 'workflow_dispatch' && inputs.cursor_backfill_days != '' && inputs.cursor_backfill_days != '0'
        env:
          CRON_SHARED_SECRET: ${{ secrets.CRON_SHARED_SECRET }}
          BACKFILL_DAYS: ${{ inputs.cursor_backfill_days }}
        run: |
          set -euo pipefail
          TOTAL="$BACKFILL_DAYS"
          if ! [[ "$TOTAL" =~ ^[0-9]+$ ]] || [ "$TOTAL" -lt 1 ]; then
            echo "::error::cursor_backfill_days must be a positive integer"
            exit 1
          fi
          if [ "$TOTAL" -gt 120 ]; then TOTAL=120; fi
          URL="${DASHBOARD_BASE_URL}/api/cron/sync-cursor-spend"
          echo "## cursor backfill ${TOTAL}d — $URL" >> "$GITHUB_STEP_SUMMARY"
          CHUNK=7
          end_offset=0
          chunk_num=0
          while [ "$end_offset" -lt "$TOTAL" ]; do
            chunk_num=$((chunk_num + 1))
            remaining=$((TOTAL - end_offset))
            lookback=$CHUNK
            if [ "$remaining" -lt "$lookback" ]; then lookback=$remaining; fi
            skip_decision="true"
            next_offset=$((end_offset + CHUNK))
            if [ "$next_offset" -ge "$TOTAL" ]; then skip_decision="false"; fi
            BODY=$(printf '{"lookbackDays":%s,"endOffsetDays":%s,"skipDecision":%s}' "$lookback" "$end_offset" "$skip_decision")
            SIG=$(printf '%s' "$BODY" | openssl dgst -sha256 -hmac "$CRON_SHARED_SECRET" | awk '{print $2}')
            echo "### chunk ${chunk_num} endOffset=${end_offset} lookback=${lookback}" >> "$GITHUB_STEP_SUMMARY"
            HTTP=$(curl -sS -o /tmp/out.json -w "%{http_code}" -X POST \
              -H "x-cron-signature: sha256=${SIG}" -H "content-type: application/json" \
              --data "$BODY" "$URL")
            cat /tmp/out.json >> "$GITHUB_STEP_SUMMARY"
            [ "$HTTP" = "200" ] || (echo "::error::HTTP $HTTP on chunk ${chunk_num}" && exit 1)
            end_offset=$((end_offset + CHUNK))
          done

  sync-codex:
    name: codex enterprise (hourly)
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '25 * * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: cron-vendor-spend-codex
      cancel-in-progress: false
    steps:
      - name: Verify secret
        env:
          CRON_SHARED_SECRET: ${{ secrets.CRON_SHARED_SECRET }}
        run: |
          if [ -z "$CRON_SHARED_SECRET" ]; then
            echo "::error::CRON_SHARED_SECRET is not set."
            exit 1
          fi
      - name: POST sync-codex-enterprise-spend
        env:
          CRON_SHARED_SECRET: ${{ secrets.CRON_SHARED_SECRET }}
        run: |
          BODY='{"lookbackDays":14}'
          SIG=$(printf '%s' "$BODY" | openssl dgst -sha256 -hmac "$CRON_SHARED_SECRET" | awk '{print $2}')
          URL="${DASHBOARD_BASE_URL}/api/cron/sync-codex-enterprise-spend"
          echo "## codex_enterprise — $URL" >> "$GITHUB_STEP_SUMMARY"
          HTTP=$(curl -sS -o /tmp/out.json -w "%{http_code}" -X POST \
            -H "x-cron-signature: sha256=${SIG}" -H "content-type: application/json" \
            --data "$BODY" "$URL")
          cat /tmp/out.json >> "$GITHUB_STEP_SUMMARY"
          [ "$HTTP" = "200" ] || (echo "::error::HTTP $HTTP" && exit 1)

  sync-workspace-analytics:
    name: workspace analytics (hourly)
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '35 * * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: cron-workspace-analytics
      cancel-in-progress: false
    steps:
      - name: Verify secret
        env:
          CRON_SHARED_SECRET: ${{ secrets.CRON_SHARED_SECRET }}
        run: |
          if [ -z "$CRON_SHARED_SECRET" ]; then
            echo "::error::CRON_SHARED_SECRET is not set."
            exit 1
          fi
      - name: POST sync-workspace-analytics
        env:
          CRON_SHARED_SECRET: ${{ secrets.CRON_SHARED_SECRET }}
        run: |
          BODY='{"initialLookbackDays":7}'
          SIG=$(printf '%s' "$BODY" | openssl dgst -sha256 -hmac "$CRON_SHARED_SECRET" | awk '{print $2}')
          URL="${DASHBOARD_BASE_URL}/api/cron/sync-workspace-analytics"
          echo "## workspace_analytics — $URL" >> "$GITHUB_STEP_SUMMARY"
          HTTP=$(curl -sS -o /tmp/out.json -w "%{http_code}" -X POST \
            -H "x-cron-signature: sha256=${SIG}" -H "content-type: application/json" \
            --data "$BODY" "$URL")
          cat /tmp/out.json >> "$GITHUB_STEP_SUMMARY"
          [ "$HTTP" = "200" ] || (echo "::error::HTTP $HTTP" && exit 1)

  sync-unified-credits:
    name: unified credits COSTS (hourly)
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '35 * * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: cron-unified-credits
      cancel-in-progress: false
    steps:
      - name: Verify secret
        env:
          CRON_SHARED_SECRET: ${{ secrets.CRON_SHARED_SECRET }}
        run: |
          if [ -z "$CRON_SHARED_SECRET" ]; then
            echo "::error::CRON_SHARED_SECRET is not set."
            exit 1
          fi
      - name: POST sync-unified-credits
        env:
          CRON_SHARED_SECRET: ${{ secrets.CRON_SHARED_SECRET }}
        run: |
          BODY='{"initialLookbackDays":30}'
          SIG=$(printf '%s' "$BODY" | openssl dgst -sha256 -hmac "$CRON_SHARED_SECRET" | awk '{print $2}')
          URL="${DASHBOARD_BASE_URL}/api/cron/sync-unified-credits"
          echo "## unified_credits — $URL" >> "$GITHUB_STEP_SUMMARY"
          HTTP=$(curl -sS -o /tmp/out.json -w "%{http_code}" -X POST \
            -H "x-cron-signature: sha256=${SIG}" -H "content-type: application/json" \
            --data "$BODY" "$URL")
          cat /tmp/out.json >> "$GITHUB_STEP_SUMMARY"
          if [ "$HTTP" = "200" ]; then exit 0; fi
          if [ "$HTTP" = "503" ] && grep -q '"notEnabled":true' /tmp/out.json; then
            echo "COSTS alpha not live on Compliance API yet — skipping."
            exit 0
          fi
          echo "::error::HTTP $HTTP" && exit 1

  sync-openai:
    name: openai org costs (twice daily)
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.schedule == '41 4 * * *' ||
      github.event.schedule == '41 16 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: cron-vendor-spend-openai
      cancel-in-progress: false
    steps:
      - name: Verify secret
        env:
          CRON_SHARED_SECRET: ${{ secrets.CRON_SHARED_SECRET }}
        run: |
          if [ -z "$CRON_SHARED_SECRET" ]; then
            echo "::error::CRON_SHARED_SECRET is not set."
            exit 1
          fi
      - name: POST sync-openai-spend (incremental)
        if: github.event_name != 'workflow_dispatch' || inputs.openai_backfill_days == '0' || inputs.openai_backfill_days == ''
        env:
          CRON_SHARED_SECRET: ${{ secrets.CRON_SHARED_SECRET }}
        run: |
          BODY='{"lookbackDays":31}'
          SIG=$(printf '%s' "$BODY" | openssl dgst -sha256 -hmac "$CRON_SHARED_SECRET" | awk '{print $2}')
          URL="${DASHBOARD_BASE_URL}/api/cron/sync-openai-spend"
          echo "## openai incremental — $URL" >> "$GITHUB_STEP_SUMMARY"
          HTTP=$(curl -sS -o /tmp/out.json -w "%{http_code}" -X POST \
            -H "x-cron-signature: sha256=${SIG}" -H "content-type: application/json" \
            --data "$BODY" "$URL")
          cat /tmp/out.json >> "$GITHUB_STEP_SUMMARY"
          [ "$HTTP" = "200" ] || (echo "::error::HTTP $HTTP" && exit 1)
      - name: POST sync-openai-spend (chunked backfill)
        if: github.event_name == 'workflow_dispatch' && inputs.openai_backfill_days != '' && inputs.openai_backfill_days != '0'
        env:
          CRON_SHARED_SECRET: ${{ secrets.CRON_SHARED_SECRET }}
          BACKFILL_DAYS: ${{ inputs.openai_backfill_days }}
        run: |
          set -euo pipefail
          TOTAL="$BACKFILL_DAYS"
          if ! [[ "$TOTAL" =~ ^[0-9]+$ ]] || [ "$TOTAL" -lt 1 ]; then
            echo "::error::openai_backfill_days must be a positive integer"
            exit 1
          fi
          if [ "$TOTAL" -gt 120 ]; then TOTAL=120; fi
          URL="${DASHBOARD_BASE_URL}/api/cron/sync-openai-spend"
          echo "## openai backfill ${TOTAL}d — $URL" >> "$GITHUB_STEP_SUMMARY"
          CHUNK=31
          end_offset=0
          chunk_num=0
          while [ "$end_offset" -lt "$TOTAL" ]; do
            chunk_num=$((chunk_num + 1))
            remaining=$((TOTAL - end_offset))
            lookback=$CHUNK
            if [ "$remaining" -lt "$lookback" ]; then lookback=$remaining; fi
            skip_decision="true"
            next_offset=$((end_offset + CHUNK))
            if [ "$next_offset" -ge "$TOTAL" ]; then skip_decision="false"; fi
            BODY=$(printf '{"lookbackDays":%s,"endOffsetDays":%s,"skipDecision":%s}' "$lookback" "$end_offset" "$skip_decision")
            SIG=$(printf '%s' "$BODY" | openssl dgst -sha256 -hmac "$CRON_SHARED_SECRET" | awk '{print $2}')
            echo "### chunk ${chunk_num} endOffset=${end_offset} lookback=${lookback}" >> "$GITHUB_STEP_SUMMARY"
            HTTP=$(curl -sS -o /tmp/out.json -w "%{http_code}" -X POST \
              -H "x-cron-signature: sha256=${SIG}" -H "content-type: application/json" \
              --data "$BODY" "$URL")
            cat /tmp/out.json >> "$GITHUB_STEP_SUMMARY"
            [ "$HTTP" = "200" ] || (echo "::error::HTTP $HTTP on chunk ${chunk_num}" && exit 1)
            end_offset=$((end_offset + CHUNK))
          done
